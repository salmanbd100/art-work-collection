<div class="favorites-page">
  <header class="page-header">
    <h1>Your Favorites</h1>
    <nav aria-label="Site navigation">
      <a routerLink="/" mat-button>← Back to collection</a>
    </nav>
  </header>

  <main aria-label="Favorite artworks">
    @if (store.favorites().length === 0) {
    <div class="empty-state" role="status">
      <p class="empty-message">You haven't saved any artworks yet.</p>
      <a routerLink="/" mat-flat-button color="primary">Browse the collection</a>
    </div>
    } @else {
    <div class="artwork-grid">
      @for (art of store.favorites(); track art.id) {
      <app-art-work-card [artWork]="art"></app-art-work-card>
      }
    </div>
    }
  </main>
</div>
